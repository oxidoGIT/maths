<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Editor · Asignaturas 2º ESO</title>
    <link rel="stylesheet" href="admin.css" />
    <script src="admin.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="kicker">Panel de contenido</p>
        <h1>Editor visual</h1>
      </div>
      <a class="button button--ghost" href="../index.html">Ver web</a>
    </header>
    <main>
      <section class="notice">
        <strong>Borrador privado del navegador</strong>
        <p>
          Los cambios se guardan automáticamente en este dispositivo. Cuando
          termines, exporta <code>content.json</code> y pásamelo para publicarlo.
        </p>
      </section>
      <section class="toolbar" aria-label="Acciones del borrador">
        <button class="button" id="export" type="button">Exportar content.json</button>
        <label class="button button--ghost" for="import">Importar JSON</label>
        <input accept="application/json" id="import" type="file" />
        <button class="button button--danger" id="reset" type="button">Restablecer borrador</button>
        <span class="status" id="status" role="status"></span>
      </section>
      <section class="panel">
        <div class="panel__header">
          <div>
            <p class="kicker">Portada</p>
            <h2>Textos generales</h2>
          </div>
        </div>
        <div class="form-grid" id="site-fields"></div>
      </section>
      <section class="subjects">
        <div class="subjects__header">
          <div>
            <p class="kicker">Árbol de contenidos</p>
            <h2>Asignaturas</h2>
          </div>
          <button class="button" data-action="add-subject" type="button">Añadir asignatura</button>
        </div>
        <div id="subjects"></div>
      </section>
    </main>
  </body>
</html>
