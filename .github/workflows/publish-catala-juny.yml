name: Publish Catalan June 2026 exam
on:
  push:
    paths:
      - .github/workflows/publish-catala-juny.yml
permissions:
  contents: write
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Publish validated Catalan study pages
        shell: bash
        run: |
          echo '' | base64 --decode > /tmp/catala-juny-2026.tar.gz
          tar -xzf /tmp/catala-juny-2026.tar.gz
          rm .github/workflows/publish-catala-juny.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add _layouts/subject.html _subjects/catala.md catala .github/workflows/publish-catala-juny.yml
          git commit -m 'Add Catalan June 2026 exam preparation'
          git push
