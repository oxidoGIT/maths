name: Check site integrity

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-sources:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate source PDFs
        run: python3 scripts/check_sources.py

      - name: Validate favicon links
        run: python3 scripts/check_favicon.py
